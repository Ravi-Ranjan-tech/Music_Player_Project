<!DOCTYPE html>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      transition: background 0.5s ease;
    }
    .logo-font { font-family: 'Space Grotesk', sans-serif; }

    .song-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .song-card:hover {
      transform: translateY(-8px) scale(1.03);
    }

    .playing { 
      background: linear-gradient(90deg, #22d3ee, #c026d3);
      color: white;
      box-shadow: 0 0 25px rgba(103, 232, 249, 0.6);
    }

    .cover-spin {
      animation: spin 28s linear infinite paused;
    }
    .playing .cover-spin { animation-play-state: running; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .bottom-player {
      backdrop-filter: blur(20px);
      transition: all 0.4s ease;
    }

    #progressBar {
      accent-color: #67e8f9;
      height: 6px;
      border-radius: 9999px;
    }

    .nav-item.active {
      background: rgba(103, 232, 249, 0.2);
      color: #67e8f9;
    }

    .toast {
      animation: toastIn 0.4s ease forwards;
    }
    @keyframes toastIn {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .lyrics {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.9;
    }

    body {
      transition: background 0.4s ease, color 0.4s ease;
    }

    body.light {
      background: #f8fafc;
      color: #0f172a;
    }

    body.light .bg-zinc-950 { background-color: #f8fafc !important; }
    body.light .bg-zinc-900 { background-color: #e2e8f0 !important; }
    body.light .bg-zinc-800 { background-color: #cbd5e1 !important; }
    body.light .bg-zinc-700 { background-color: #94a3b8 !important; }
    body.light .bg-zinc-900\/95 { background-color: rgba(226,232,240,0.95) !important; }
    body.light .bg-zinc-900\/80 { background-color: rgba(226,232,240,0.8) !important; }
    body.light .border-zinc-800 { border-color: #cbd5e1 !important; }
    body.light .border-zinc-700 { border-color: #94a3b8 !important; }
    body.light .text-white { color: #0f172a !important; }
    body.light .text-zinc-400 { color: #475569 !important; }
    body.light .text-zinc-500 { color: #64748b !important; }
    body.light .text-black { color: #0f172a !important; }
    body.light .bg-black\/80 { background-color: rgba(255,255,255,0.92) !important; }
    body.light .bg-white\/10 { background-color: rgba(255,255,255,0.12) !important; }
  </style>
</head>

    let currentSongIndex = 0;
    let isPlaying = false;
    let isShuffle = false;
    let repeatMode = 0; // 0=off, 1=all, 2=one
    let favorites = [];
    let recentlyPlayed = [];
    let queue = [];
    let currentSpeed = 1.0;
    let isMuted = false;
    let lastVolume = 0.75;
    let isDarkMode = true;
    let isMini = false;

    const audio = document.getElementById('audioPlayer');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const playBtn = document.getElementById('playBtn');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playerCover = document.getElementById('playerCover');
    const favBtn = document.getElementById('favBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeIcon = document.getElementById('volumeIcon');
    const visualizerCanvas = document.getElementById('visualizer');
    const ctx = visualizerCanvas.getContext('2d');
    const miniPlayer = document.getElementById('miniPlayer');
    const mainPlayer = document.getElementById('mainPlayer');

    let animationFrame;
    let bars = new Array(60).fill(10);

    // Fake lyrics for demo
    const demoLyrics = [
      "Floating through the neon lights...",
      "Heartbeat syncing with the bass...",
      "Lost in this endless dream...",
      "We rise above the city glow...",
      "Feel the rhythm take control..."
    ];

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast fixed bottom-20 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-[200]';
      toast.innerHTML = `<i class="fa-solid fa-check-circle text-cyan-400"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    function loadSong(index) {
      currentSongIndex = Math.max(0, Math.min(index, songs.length-1));
      const song = songs[currentSongIndex];
      audio.src = encodeURI(song.src);
      playerTitle.textContent = song.title;
      playerArtist.textContent = song.artist;
      playerCover.src = song.cover;
      document.getElementById('miniCover').src = song.cover;
      document.getElementById('miniTitle').textContent = song.title;

      updatePlayingHighlight();
      addToRecentlyPlayed(song);
      if (!queue.includes(song)) queue.push(song);
      renderQueue();
    }

    function togglePlay() {
      if (!audio.src) loadSong(0);
      if (isPlaying) {
        audio.pause();
        playBtn.innerHTML = '▶';
      } else {
        audio.play();
        playBtn.innerHTML = '❚❚';
      }
      isPlaying = !isPlaying;
      if (isPlaying) startVisualizer();
      else cancelAnimationFrame(animationFrame);
    }

    function nextTrack() {
      if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
      let next = isShuffle ? Math.floor(Math.random()*songs.length) : currentSongIndex + 1;
      if (next >= songs.length) next = 0;
      loadSong(next);
      if (isPlaying) audio.play();
    }

    function prevTrack() {
      let prev = isShuffle ? Math.floor(Math.random()*songs.length) : currentSongIndex - 1;
      if (prev < 0) prev = songs.length - 1;
      loadSong(prev);
      if (isPlaying) audio.play();
    }

    function updateProgress() {
      if (!audio.duration) return;
      progressBar.value = (audio.currentTime / audio.duration) * 100;
      currentTimeEl.textContent = formatTime(audio.currentTime);
      durationEl.textContent = formatTime(audio.duration);
    }

    function seekAudio() {
      audio.currentTime = (progressBar.value / 100) * audio.duration;
    }

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s<10?'0':''}${s}`;
    }

    function changeVolume() {
      audio.volume = volumeSlider.value / 100;
      lastVolume = audio.volume;
      isMuted = false;
      updateVolumeIcon();
    }

    function toggleMute() {
      if (isMuted) {
        audio.volume = lastVolume;
        volumeSlider.value = lastVolume * 100;
      } else {
        lastVolume = audio.volume;
        audio.volume = 0;
        volumeSlider.value = 0;
      }
      isMuted = !isMuted;
      updateVolumeIcon();
    }

    function updateVolumeIcon() {
      volumeIcon.className = audio.volume === 0 ? "fa-solid fa-volume-xmark cursor-pointer text-2xl" : 
                              audio.volume < 0.4 ? "fa-solid fa-volume-low cursor-pointer text-2xl" : 
                              "fa-solid fa-volume-high cursor-pointer text-2xl";
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      document.getElementById('shuffleBtn').style.color = isShuffle ? '#67e8f9' : '';
      showToast(isShuffle ? "Shuffle Enabled" : "Shuffle Disabled");
    }

    function toggleRepeat() {
      repeatMode = (repeatMode + 1) % 3;
      const colors = ['', '#67e8f9', '#f472b6'];
      document.getElementById('repeatBtn').style.color = colors[repeatMode];
      showToast(["Repeat Off", "Repeat All", "Repeat One"][repeatMode]);
    }

    function changeEqualizer() {
      const presets = ["Bass", "Treble", "Chill", "Party"];
      let current = document.getElementById('eqBtn').textContent;
      let idx = presets.indexOf(current);
      let next = presets[(idx + 1) % 4];
      document.getElementById('eqBtn').textContent = next;
      
      if (next === "Party") audio.playbackRate = 1.15;
      else if (next === "Chill") audio.playbackRate = 0.92;
      else audio.playbackRate = 1.0;
      
      showToast(next + " Equalizer Applied");
    }

    function toggleFavorite() {
      const song = songs[currentSongIndex];
      const idx = favorites.findIndex(s => s.id === song.id);
      if (idx > -1) {
        favorites.splice(idx, 1);
        favBtn.innerHTML = '♡';
      } else {
        favorites.push(song);
        favBtn.innerHTML = '❤️';
        showToast("Added to Favorites");
      }
      if (!document.getElementById('favoritesTab').classList.contains('hidden')) renderFavorites();
    }

    function addToRecentlyPlayed(song) {
      recentlyPlayed = recentlyPlayed.filter(s => s.id !== song.id);
      recentlyPlayed.unshift(song);
      if (recentlyPlayed.length > 8) recentlyPlayed.pop();
      renderRecentlyPlayed();
    }

    function addToQueue(song) {
      if (!queue.some(s => s.id === song.id)) {
        queue.push(song);
        renderQueue();
        showToast("Added to Queue");
      }
    }

    function renderQueue() {
      const container = document.getElementById('queueList');
      container.innerHTML = '';
      queue.forEach((song, i) => {
        const div = document.createElement('div');
        div.className = `flex items-center gap-4 p-4 bg-zinc-900 rounded-3xl ${i === 0 ? 'playing' : ''}`;
        div.innerHTML = `
          <img src="${song.cover}" class="w-14 h-14 rounded-2xl object-cover"/>
          <div class="flex-1">
            <div class="font-medium">${song.title}</div>
            <div class="text-sm text-zinc-400">${song.artist}</div>
          </div>
          <button onclick="playFromQueue(${i}); event.stopImmediatePropagation()" class="px-6 py-2 bg-cyan-400 text-black rounded-2xl text-sm font-medium">Play</button>
        `;
        container.appendChild(div);
      });
    }

    function playFromQueue(index) {
      const song = queue[index];
      const realIndex = songs.findIndex(s => s.id === song.id);
      playSong(realIndex);
    }

    function clearQueue() {
      queue = [];
      renderQueue();
      showToast("Queue Cleared");
    }

    // Render functions (same as before, but with add to queue button)
    function createSongElement(song) {
      const div = document.createElement('div');
      div.className = `song-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer group`;
      div.innerHTML = `
        <div class="relative">
          <img src="${song.cover}" class="w-full aspect-square object-cover"/>
          <div class="absolute bottom-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition">
            <button onclick="event.stopImmediatePropagation(); addToQueue(songs[${songs.indexOf(song)}]);" class="w-10 h-10 bg-white/90 hover:bg-white rounded-2xl flex items-center justify-center shadow">➕</button>
            <button onclick="event.stopImmediatePropagation(); playSong(${songs.indexOf(song)})" class="w-10 h-10 bg-cyan-400 rounded-2xl flex items-center justify-center shadow">▶</button>
          </div>
        </div>
        <div class="p-5">
          <div class="font-semibold truncate">${song.title}</div>
          <div class="text-sm text-zinc-400 truncate">${song.artist}</div>
        </div>
      `;
      div.onclick = () => playSong(songs.indexOf(song));
      return div;
    }

    function renderFeatured() {
      const container = document.getElementById('featuredGrid');
      container.innerHTML = '';
      songs.forEach(song => container.appendChild(createSongElement(song)));
    }

    function renderRecentlyPlayed() {
      const container = document.getElementById('recentGrid');
      container.innerHTML = '';
      recentlyPlayed.forEach(song => container.appendChild(createSongElement(song)));
    }

    function renderLibrary() { 
      const container = document.getElementById('libraryList');
      container.innerHTML = '';
      songs.forEach(song => container.appendChild(createSongElement(song)));
    }

    function renderFavorites() {
      const container = document.getElementById('favoritesList');
      container.innerHTML = favorites.length ? '' : `<p class="col-span-full text-center py-20 text-zinc-400">No favorites yet. Heart some songs!</p>`;
      favorites.forEach(song => container.appendChild(createSongElement(song)));
    }

    function playSong(index) {
      loadSong(index);
      audio.play().then(() => {
        isPlaying = true;
        playBtn.innerHTML = '❚❚';
        startVisualizer();
      }).catch(() => {
        showToast('Unable to play this song. Check the file path.');
      });
    }

    function updatePlayingHighlight() {
      renderLibrary();
      renderFavorites();
    }

    function filterSongs() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      const filtered = songs.filter(s => s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term));
      const activeTab = document.querySelector('.tab:not(.hidden)');
      if (activeTab && activeTab.id === 'libraryTab') {
        const container = document.getElementById('libraryList');
        container.innerHTML = '';
        filtered.forEach(song => container.appendChild(createSongElement(song)));
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === tab));
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      if (tab === 0) document.getElementById('homeTab').classList.remove('hidden');
      else if (tab === 1) { document.getElementById('libraryTab').classList.remove('hidden'); renderLibrary(); }
      else if (tab === 2) { document.getElementById('favoritesTab').classList.remove('hidden'); renderFavorites(); }
      else if (tab === 3) { document.getElementById('queueTab').classList.remove('hidden'); renderQueue(); }
    }

    function createPlaylist() {
      const name = prompt("Playlist name?");
      if (name) showToast(`Playlist "${name}" created!`);
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.body.classList.toggle('dark', isDarkMode);
      document.body.classList.toggle('light', !isDarkMode);
      document.getElementById('themeIcon').classList.toggle('fa-moon', isDarkMode);
      document.getElementById('themeIcon').classList.toggle('fa-sun', !isDarkMode);
    }

    function toggleMiniPlayer() {
      isMini = !isMini;
      mainPlayer.classList.toggle('hidden', isMini);
      miniPlayer.classList.toggle('hidden', !isMini);
    }

    function showLyrics() {
      const modal = document.getElementById('lyricsModal');
      const textContainer = document.getElementById('lyricsText');
      modal.classList.remove('hidden');
      let i = 0;
      textContainer.innerHTML = demoLyrics[0];
      const interval = setInterval(() => {
        i = (i + 1) % demoLyrics.length;
        textContainer.innerHTML = demoLyrics[i];
      }, 2200);
      modal.dataset.interval = interval;
    }

    function hideLyrics() {
      const modal = document.getElementById('lyricsModal');
      clearInterval(modal.dataset.interval);
      modal.classList.add('hidden');
    }

    // Visualizer
    function startVisualizer() {
      cancelAnimationFrame(animationFrame);
      function draw() {
        ctx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        const barWidth = visualizerCanvas.width / bars.length * 0.75;
        for (let i = 0; i < bars.length; i++) {
          bars[i] = 10 + Math.random() * 38 * (isPlaying ? 1 : 0.3);
          const h = bars[i];
          ctx.fillStyle = `hsl(${200 + i*2}, 95%, 68%)`;
          ctx.fillRect(i * (visualizerCanvas.width / bars.length), visualizerCanvas.height - h, barWidth, h);
        }
        animationFrame = requestAnimationFrame(draw);
      }
      draw();
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'ArrowRight') audio.currentTime += 10;
      if (e.code === 'ArrowLeft') audio.currentTime -= 10;
      if (e.code === 'ArrowUp') { volumeSlider.value = Math.min(100, +volumeSlider.value + 10); changeVolume(); }
      if (e.code === 'ArrowDown') { volumeSlider.value = Math.max(0, +volumeSlider.value - 10); changeVolume(); }
    });

    // Init
    function init() {
      renderFeatured();
      renderRecentlyPlayed();
      switchTab(0);
      loadSong(0);
      audio.volume = 0.75;
      volumeSlider.value = 75;
      showToast("Welcome to BeatFlow! 🎵");
    }

    window.onload = init;
  </script>
</body>
</html>
